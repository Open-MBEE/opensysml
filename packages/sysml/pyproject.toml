[build-system]
requires = ["hatchling>=1.24"]
build-backend = "hatchling.build"

[project]
name = "sysml"
version = "0.1.0"
description = "Compatibility package for OpenSysML."
readme = "README.md"
requires-python = ">=3.9"
license = "Apache-2.0"
authors = [
  { name = "OpenSysML Contributors" }
]
dependencies = [
  "opensysml==0.1.0"
]
classifiers = [
  "Development Status :: 2 - Pre-Alpha",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
]

[project.urls]
Homepage = "https://github.com/rkarban/opensysml"
Repository = "https://github.com/rkarban/opensysml"

[tool.hatch.build.targets.wheel]
packages = ["src/sysml"]

